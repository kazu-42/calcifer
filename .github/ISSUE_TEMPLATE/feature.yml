name: Feature request
description: Propose a focused improvement or provider-safe workflow
title: "[Feature]: "
labels: [enhancement, triage]
body:
  - type: markdown
    attributes:
      value: |
        Explain the user outcome, not only a proposed command. Authentication, storage, process, and failover changes must preserve the documented security invariants.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is difficult today, and who experiences it?
    validations:
      required: true

  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: What should become possible?
    validations:
      required: true

  - type: textarea
    id: safety
    attributes:
      label: Security and failure boundaries
      description: Consider identity, secrets, trust domains, side effects, errors, recovery, and provider policy.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
