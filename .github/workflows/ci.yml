name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust
        run: rustup toolchain install 1.96.0 --profile minimal --component rustfmt --component clippy
      - name: Check formatting
        run: cargo +1.96.0 fmt --all -- --check
      - name: Run Clippy
        run: cargo +1.96.0 clippy --all-targets --all-features --locked -- -D warnings
      - name: Check documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo +1.96.0 doc --no-deps --all-features --locked

  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust
        run: rustup toolchain install 1.96.0 --profile minimal
      - name: Run tests
        run: cargo +1.96.0 test --all-targets --all-features --locked

  msrv:
    name: MSRV (1.85.0)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust
        run: rustup toolchain install 1.85.0 --profile minimal
      - name: Check minimum supported Rust version
        run: cargo +1.85.0 check --all-targets --all-features --locked
