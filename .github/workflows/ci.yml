name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Lint GitHub Actions workflows
        shell: bash
        env:
          ACTIONLINT_VERSION: 1.7.12
          ACTIONLINT_ARCHIVE_SHA256: 8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
        run: |
          set -euo pipefail
          export LC_ALL=C

          scratch="$(mktemp -d "${RUNNER_TEMP:?}/calcifer-actionlint.XXXXXX")"
          cleanup() {
            rm -rf "${scratch}"
          }
          trap cleanup EXIT

          archive="${scratch}/actionlint.tar.gz"
          curl \
            --fail \
            --location \
            --proto '=https' \
            --proto-redir '=https' \
            --tlsv1.2 \
            --connect-timeout 20 \
            --max-time 120 \
            --retry 3 \
            --retry-delay 2 \
            --show-error \
            --silent \
            --output "${archive}" \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"

          actual_sha256="$(sha256sum "${archive}" | awk '{print $1}')"
          if [[ "${actual_sha256}" != "${ACTIONLINT_ARCHIVE_SHA256}" ]]; then
            echo "The actionlint archive checksum did not match the pinned digest." >&2
            exit 1
          fi
          tar -xzf "${archive}" -C "${scratch}" actionlint
          "${scratch}/actionlint" -color -shellcheck= -pyflakes=
      - name: Install Rust
        run: rustup toolchain install 1.96.0 --profile minimal --component rustfmt --component clippy
      - name: Check formatting
        run: cargo +1.96.0 fmt --all -- --check
      - name: Run Clippy
        run: cargo +1.96.0 clippy --all-targets --all-features --locked -- -D warnings
      - name: Test release packaging
        run: python3 -m unittest discover -s scripts -p 'test_*.py'
      - name: Check documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo +1.96.0 doc --no-deps --all-features --locked

  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust
        run: rustup toolchain install 1.96.0 --profile minimal
      - name: Install supervisor MSRV
        if: runner.os != 'Windows'
        run: rustup toolchain install 1.85.0 --profile minimal
      - name: Run tests
        run: cargo +1.96.0 test --all-targets --all-features --locked -- --test-threads=1
      - name: Run repeated supervisor regression suites at MSRV
        if: runner.os != 'Windows'
        env:
          SUPERVISOR_MSRV_RUNS: 2
        run: make supervisor-msrv
      - name: Test Linux mount-boundary enforcement
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail

          command -v jq
          command -v unshare
          command -v mount
          command -v umount
          sudo -n true
          uname -a

          test_name='profiles::tests::removal_rejects_same_device_bind_mount_during_validation_and_cleanup'
          test_binary="$(
            cargo +1.96.0 test \
              --lib \
              --all-features \
              --locked \
              --no-run \
              --message-format=json |
              jq -r '
                select(
                  .reason == "compiler-artifact"
                  and .profile.test == true
                  and .target.name == "calcifer"
                  and (.target.kind | index("lib")) != null
                  and .executable != null
                )
                | .executable
              ' |
              tail -n 1
          )"

          test -n "$test_binary"
          test -x "$test_binary"
          # Consume the complete list. `grep -q` can close the pipe after an
          # early match and make libtest fail with BrokenPipe under pipefail.
          "$test_binary" --list | grep -Fx "$test_name: test" >/dev/null

          sudo -n unshare \
            --mount \
            --propagation private \
            -- \
            "$test_binary" \
            "$test_name" \
            --exact \
            --ignored \
            --nocapture

  pinned-codex-package:
    name: Pinned Codex (${{ matrix.scenario }}, ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            suite: contracts
            scenario: contracts
            job_timeout_minutes: 25
          - os: macos-latest
            suite: contracts
            scenario: contracts
            job_timeout_minutes: 25
          - os: ubuntu-24.04
            suite: official-tui
            scenario: official-tui-normal
            job_timeout_minutes: 45
          - os: macos-latest
            suite: official-tui
            scenario: official-tui-normal
            job_timeout_minutes: 45
          - os: ubuntu-24.04
            suite: official-tui
            scenario: official-tui-recovery
            job_timeout_minutes: 45
          - os: macos-latest
            suite: official-tui
            scenario: official-tui-recovery
            job_timeout_minutes: 45
    runs-on: ${{ matrix.os }}
    timeout-minutes: ${{ matrix.job_timeout_minutes }}
    env:
      CODEX_RELEASE_TAG: rust-v0.144.4
      CODEX_VERSION: 0.144.4
      PACKAGE_INTERNAL_FENCE_SECONDS: 1500
      PACKAGE_OFFICIAL_TUI_WATCHDOG_SECONDS: 1680
      PACKAGE_OFFICIAL_TUI_WATCHDOG_MARGIN_SECONDS: 180
      PACKAGE_OFFICIAL_TUI_JOB_MARGIN_SECONDS: 1020
      PACKAGE_OFFICIAL_TUI_JOB_TIMEOUT_MINUTES: ${{ matrix.job_timeout_minutes }}
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust
        run: rustup toolchain install 1.96.0 --profile minimal
      - name: Prepare checksum-pinned Codex package
        shell: bash
        run: |
          set -euo pipefail
          export LC_ALL=C

          platform="$(uname -s)-$(uname -m)"
          case "${platform}" in
            Linux-x86_64)
              target="x86_64-unknown-linux-musl"
              expected_sha256="37c985be9d89e8c4f43b3aa0594c1213eac212d30ae2b95221f08fec807515d1"
              ;;
            Linux-aarch64 | Linux-arm64)
              target="aarch64-unknown-linux-musl"
              expected_sha256="4d07243ef4ae6786b8b321d7aea3f9be4e1d2c597ae5407e7c1b9873334082b2"
              ;;
            Darwin-x86_64)
              target="x86_64-apple-darwin"
              expected_sha256="274ea4931246621d477ad61d61ea3303527878e77fa910087df52153f5e6188e"
              ;;
            Darwin-arm64 | Darwin-aarch64)
              target="aarch64-apple-darwin"
              expected_sha256="77c8969a481302f9db1d9ea2a6c21c083abae3f1a8fc8a7275dc38323699391e"
              ;;
            *)
              echo "No pinned Codex package is configured for ${platform}." >&2
              exit 1
              ;;
          esac

          scratch="$(mktemp -d "${RUNNER_TEMP:?}/calcifer-codex-compat.XXXXXX")"
          retain_scratch=false
          cleanup_prepare_failure() {
            if [[ "${retain_scratch}" != true ]]; then
              rm -rf -- "${scratch}"
            fi
          }
          trap cleanup_prepare_failure EXIT
          echo "CALCIFER_CODEX_PACKAGE_ROOT=${scratch}" >> "${GITHUB_ENV:?}"

          archive="${scratch}/codex-${target}.tar.gz"
          release_url="https://github.com/openai/codex/releases/download/${CODEX_RELEASE_TAG}/codex-${target}.tar.gz"
          curl \
            --fail \
            --location \
            --proto '=https' \
            --proto-redir '=https' \
            --tlsv1.2 \
            --connect-timeout 20 \
            --max-time 300 \
            --retry 3 \
            --retry-delay 2 \
            --show-error \
            --silent \
            --output "${archive}" \
            "${release_url}"

          if command -v sha256sum >/dev/null 2>&1; then
            actual_sha256="$(sha256sum "${archive}" | awk '{print $1}')"
          elif command -v shasum >/dev/null 2>&1; then
            actual_sha256="$(shasum -a 256 "${archive}" | awk '{print $1}')"
          else
            echo "Neither sha256sum nor shasum is available." >&2
            exit 1
          fi
          if [[ "${actual_sha256}" != "${expected_sha256}" ]]; then
            echo "Codex package SHA-256 mismatch for ${target}." >&2
            echo "Expected: ${expected_sha256}" >&2
            echo "Actual:   ${actual_sha256}" >&2
            exit 1
          fi

          expected_entry="codex-${target}"
          archive_entries="${scratch}/archive-entries.txt"
          tar -tzf "${archive}" > "${archive_entries}"
          entry_count="$(awk 'END { print NR + 0 }' "${archive_entries}")"
          IFS= read -r archive_entry < "${archive_entries}" || true
          if [[ "${entry_count}" != "1" || "${archive_entry:-}" != "${expected_entry}" ]]; then
            echo "Codex package must contain exactly ${expected_entry}." >&2
            exit 1
          fi

          archive_details="${scratch}/archive-details.txt"
          tar -tvzf "${archive}" > "${archive_details}"
          detail_count="$(awk 'END { print NR + 0 }' "${archive_details}")"
          IFS= read -r archive_detail < "${archive_details}" || true
          if [[ "${detail_count}" != "1" || "${archive_detail:-}" != -* ]]; then
            echo "Codex package entry must be a regular file." >&2
            exit 1
          fi

          extract_dir="${scratch}/extract"
          mkdir "${extract_dir}"
          binary="${extract_dir}/${expected_entry}"
          (umask 077; tar -xOzf "${archive}" "${expected_entry}" > "${binary}")
          if [[ ! -f "${binary}" || -L "${binary}" || ! -s "${binary}" ]]; then
            echo "Codex package did not produce one regular binary." >&2
            exit 1
          fi
          chmod 0700 "${binary}"

          actual_version="$("${binary}" --version)"
          if [[ "${actual_version}" != "codex-cli ${CODEX_VERSION}" ]]; then
            echo "Unexpected Codex package version: ${actual_version}" >&2
            exit 1
          fi

          echo "CALCIFER_CODEX_COMPAT_BINARY=${binary}" >> "${GITHUB_ENV:?}"
          retain_scratch=true
      - name: Run pinned Codex contract probes
        if: matrix.suite == 'contracts'
        shell: bash
        run: |
          set -euo pipefail
          export LC_ALL=C

          if [[ ! -f "${CALCIFER_CODEX_COMPAT_BINARY:?}" || -L "${CALCIFER_CODEX_COMPAT_BINARY}" || ! -x "${CALCIFER_CODEX_COMPAT_BINARY}" ]]; then
            echo "The pinned Codex binary was not a canonical executable file." >&2
            exit 1
          fi
          test_names=(
            'providers::codex::handoff_compat::tests::packaged_codex_0_144_4_passes_the_complete_handoff_probe'
            'providers::codex::supervisor::packaged_smoke::packaged_codex_running_turn_obeys_the_pinned_graceful_drain_contract'
            'providers::codex::supervisor::packaged_smoke::packaged_codex_detached_tool_inherits_no_calcifer_authority'
            'providers::codex::supervisor::packaged_smoke::packaged_codex_typed_monitor_accepts_usage_and_redacts_provider_failure'
          )
          for test_name in "${test_names[@]}"; do
            discovered="$(
              cargo +1.96.0 test \
                --lib \
                --all-features \
                --locked \
                "${test_name}" \
                -- \
                --exact \
                --ignored \
                --list \
                --format terse
            )"
            if ! grep -Fqx -- "${test_name}: test" <<<"${discovered}"; then
              echo "Pinned Codex package test was not discovered: ${test_name}" >&2
              exit 1
            fi
            cargo +1.96.0 test \
              --lib \
              --all-features \
              --locked \
              "${test_name}" \
              -- \
              --exact \
              --ignored \
              --nocapture
          done
      - name: Build and verify the package TUI launcher fixture
        if: matrix.suite == 'official-tui'
        shell: bash
        run: |
          set -euo pipefail
          cargo +1.96.0 build \
            --bin calcifer-supervisor-fixture \
            --all-features \
            --locked
          built_fixture_directory="$(cd target/debug && pwd -P)"
          built_fixture="${built_fixture_directory}/calcifer-supervisor-fixture"
          if [[ ! -f "${built_fixture}" || -L "${built_fixture}" || ! -x "${built_fixture}" ]]; then
            echo "The dedicated package TUI launcher fixture was not a canonical executable file." >&2
            exit 1
          fi

          # Cargo may hard-link a top-level binary to target/debug/deps. The
          # netns boundary correctly rejects multiply-linked executable
          # authority, so stage the exact bytes into the existing private
          # package root instead of weakening that validator.
          launcher_directory="${CALCIFER_CODEX_PACKAGE_ROOT:?}/launcher"
          mkdir -m 0700 "${launcher_directory}"
          launcher_directory="$(cd "${launcher_directory}" && pwd -P)"
          fixture_binary="${launcher_directory}/calcifer-supervisor-fixture"
          (umask 077; cp "${built_fixture}" "${fixture_binary}")
          chmod 0700 "${fixture_binary}"
          if ! cmp -s "${built_fixture}" "${fixture_binary}"; then
            echo "The staged package TUI launcher did not match the locked build." >&2
            exit 1
          fi
          launcher_link_count="$(python3 -c 'import os, sys; print(os.lstat(sys.argv[1]).st_nlink)' "${fixture_binary}")"
          if [[ "${launcher_link_count}" != 1 ]]; then
            echo "The staged package TUI launcher was not singly linked." >&2
            exit 1
          fi
          if [[ ! -f "${fixture_binary}" || -L "${fixture_binary}" || ! -O "${fixture_binary}" || ! -x "${fixture_binary}" ]]; then
            echo "The staged package TUI launcher was not a private runner-owned executable." >&2
            exit 1
          fi
          echo "CALCIFER_PACKAGE_TUI_LAUNCHER=${fixture_binary}" >> "${GITHUB_ENV:?}"
      - name: Prepare the exact official Codex TUI libtest
        if: matrix.suite == 'official-tui'
        shell: bash
        env:
          PACKAGE_OFFICIAL_TUI_SCENARIO: ${{ matrix.scenario }}
        run: |
          set -euo pipefail
          export LC_ALL=C

          case "${PACKAGE_OFFICIAL_TUI_SCENARIO:?}" in
            official-tui-normal)
              test_name='providers::codex::supervisor::packaged_smoke::packaged_codex_official_tui_uses_production_coordinator_guardian_session_pty_and_job_control'
              ;;
            official-tui-recovery)
              test_name='providers::codex::supervisor::packaged_smoke::packaged_codex_official_tui_recovers_retained_cleanup_pending_with_four_proofs'
              ;;
            *)
              echo "Unknown official TUI scenario: ${PACKAGE_OFFICIAL_TUI_SCENARIO}" >&2
              exit 1
              ;;
          esac
          if [[ ! -f "${CALCIFER_CODEX_COMPAT_BINARY:?}" || -L "${CALCIFER_CODEX_COMPAT_BINARY}" || ! -x "${CALCIFER_CODEX_COMPAT_BINARY}" ]]; then
            echo "The pinned Codex binary was not a canonical executable file." >&2
            exit 1
          fi
          if [[ ! -f "${CALCIFER_PACKAGE_TUI_LAUNCHER:?}" || -L "${CALCIFER_PACKAGE_TUI_LAUNCHER}" || ! -x "${CALCIFER_PACKAGE_TUI_LAUNCHER}" ]]; then
            echo "The package TUI launcher fixture was not a canonical executable file." >&2
            exit 1
          fi
          command -v jq >/dev/null
          python3 scripts/run_with_watchdog.py validate-budget \
            --rust-source src/providers/codex/supervisor/packaged_smoke.rs \
            --rust-constant PACKAGE_SUPERVISOR_EXTERNAL_HARD_TIMEOUT \
            --internal-fence-seconds "${PACKAGE_INTERNAL_FENCE_SECONDS:?}" \
            --watchdog-seconds "${PACKAGE_OFFICIAL_TUI_WATCHDOG_SECONDS:?}" \
            --watchdog-margin-seconds "${PACKAGE_OFFICIAL_TUI_WATCHDOG_MARGIN_SECONDS:?}" \
            --job-timeout-minutes "${PACKAGE_OFFICIAL_TUI_JOB_TIMEOUT_MINUTES:?}" \
            --job-margin-seconds "${PACKAGE_OFFICIAL_TUI_JOB_MARGIN_SECONDS:?}"

          metadata_paths=()
          cleanup_metadata() {
            if (( ${#metadata_paths[@]} > 0 )); then
              rm -f -- "${metadata_paths[@]}"
            fi
          }
          trap cleanup_metadata EXIT
          artifact_json="$(mktemp "${RUNNER_TEMP:?}/calcifer-libtest-artifacts.XXXXXX")"
          metadata_paths+=("${artifact_json}")
          artifact_candidates="$(mktemp "${RUNNER_TEMP}/calcifer-libtest-candidates.XXXXXX")"
          metadata_paths+=("${artifact_candidates}")
          test_list="$(mktemp "${RUNNER_TEMP}/calcifer-libtest-list.XXXXXX")"
          metadata_paths+=("${test_list}")

          # Compilation and dependency resolution happen before the Linux
          # network boundary. The namespace receives only this exact libtest.
          cargo +1.96.0 test \
            --lib \
            --all-features \
            --locked \
            --no-run \
            --message-format=json \
            > "${artifact_json}"
          jq -r '
            select(
              .reason == "compiler-artifact"
              and .profile.test == true
              and .target.name == "calcifer"
              and (.target.kind | index("lib")) != null
              and .executable != null
            )
            | .executable
          ' "${artifact_json}" > "${artifact_candidates}"

          candidate_count="$(awk 'END { print NR + 0 }' "${artifact_candidates}")"
          if [[ "${candidate_count}" != 1 ]]; then
            echo "Expected exactly one Calcifer library test binary." >&2
            exit 1
          fi
          IFS= read -r test_binary < "${artifact_candidates}"
          test_binary_directory="$(cd "$(dirname "${test_binary}")" && pwd -P)"
          test_binary="${test_binary_directory}/$(basename "${test_binary}")"
          if [[ ! -f "${test_binary}" || -L "${test_binary}" || ! -x "${test_binary}" ]]; then
            echo "The Calcifer library test binary was not a canonical executable file." >&2
            exit 1
          fi

          # Consume the entire list so libtest cannot observe BrokenPipe.
          "${test_binary}" \
            "${test_name}" \
            --exact \
            --ignored \
            --list \
            --format terse \
            > "${test_list}"
          if [[ "$(grep -Fxc -- "${test_name}: test" "${test_list}")" != 1 ]]; then
            echo "Pinned Codex package test was not discovered: ${test_name}" >&2
            exit 1
          fi
          echo "CALCIFER_PACKAGE_TUI_TEST_BINARY=${test_binary}" >> "${GITHUB_ENV:?}"
          echo "CALCIFER_PACKAGE_TUI_TEST_NAME=${test_name}" >> "${GITHUB_ENV}"
      - name: Run official Codex TUI native functional probe
        if: matrix.suite == 'official-tui' && runner.os != 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          export LC_ALL=C

          python3 scripts/run_with_watchdog.py run \
            --timeout-seconds "${PACKAGE_OFFICIAL_TUI_WATCHDOG_SECONDS:?}" \
            --term-grace-seconds 30 \
            -- \
            "${CALCIFER_PACKAGE_TUI_TEST_BINARY:?}" \
              "${CALCIFER_PACKAGE_TUI_TEST_NAME:?}" \
              --exact \
              --ignored \
              --nocapture
      - name: Run official Codex TUI in a loopback-only network namespace
        if: matrix.suite == 'official-tui' && runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          export LC_ALL=C

          command -v sudo >/dev/null
          command -v unshare >/dev/null
          command -v setpriv >/dev/null
          command -v ip >/dev/null
          sudo -n true

          # There is deliberately no native-network fallback. The helper
          # fails unless it proves a loopback-only namespace, drops every
          # capability, clears inherited environment authority and sockets,
          # and then execs the prebuilt exact libtest directly.
          python3 scripts/run_with_watchdog.py run \
            --timeout-seconds "${PACKAGE_OFFICIAL_TUI_WATCHDOG_SECONDS:?}" \
            --term-grace-seconds 30 \
            -- \
            python3 scripts/run_loopback_netns.py \
              --test-binary "${CALCIFER_PACKAGE_TUI_TEST_BINARY:?}" \
              --test-name "${CALCIFER_PACKAGE_TUI_TEST_NAME:?}" \
              --codex-binary "${CALCIFER_CODEX_COMPAT_BINARY:?}" \
              --launcher-binary "${CALCIFER_PACKAGE_TUI_LAUNCHER:?}"
      # The watchdog bounds only its direct command group. A package process
      # may have created another session, so any failed probe retains its
      # evidence root until the ephemeral runner performs whole-job teardown.
      - name: Remove pinned Codex package scratch after successful probes
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          package_root="${CALCIFER_CODEX_PACKAGE_ROOT:-}"
          if [[ -z "${package_root}" ]]; then
            echo "Pinned Codex package scratch was not registered." >&2
            exit 1
          fi
          case "${package_root}" in
            "${RUNNER_TEMP:?}"/calcifer-codex-compat.*)
              rm -rf -- "${package_root}"
              if [[ -e "${package_root}" || -L "${package_root}" ]]; then
                echo "Pinned Codex package scratch still exists after cleanup." >&2
                exit 1
              fi
              ;;
            *)
              echo "Refusing to remove an unexpected package scratch path." >&2
              exit 1
              ;;
          esac

  pinned-codex-gate:
    name: Pinned Codex Package
    if: always()
    needs: pinned-codex-package
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Require every pinned Codex package scenario
        shell: bash
        env:
          PINNED_CODEX_RESULT: ${{ needs.pinned-codex-package.result }}
        run: |
          set -euo pipefail
          if [[ "${PINNED_CODEX_RESULT:?}" != success ]]; then
            echo "A pinned Codex package scenario did not succeed." >&2
            exit 1
          fi

  msrv:
    name: MSRV (1.85.0)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust
        run: rustup toolchain install 1.85.0 --profile minimal
      - name: Check minimum supported Rust version
        run: cargo +1.85.0 check --all-targets --all-features --locked
