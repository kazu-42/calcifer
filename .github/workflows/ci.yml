name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Lint GitHub Actions workflows
        shell: bash
        env:
          ACTIONLINT_VERSION: 1.7.12
          ACTIONLINT_ARCHIVE_SHA256: 8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
        run: |
          set -euo pipefail
          export LC_ALL=C

          scratch="$(mktemp -d "${RUNNER_TEMP:?}/calcifer-actionlint.XXXXXX")"
          cleanup() {
            rm -rf "${scratch}"
          }
          trap cleanup EXIT

          archive="${scratch}/actionlint.tar.gz"
          curl \
            --fail \
            --location \
            --proto '=https' \
            --proto-redir '=https' \
            --tlsv1.2 \
            --connect-timeout 20 \
            --max-time 120 \
            --retry 3 \
            --retry-delay 2 \
            --show-error \
            --silent \
            --output "${archive}" \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"

          actual_sha256="$(sha256sum "${archive}" | awk '{print $1}')"
          if [[ "${actual_sha256}" != "${ACTIONLINT_ARCHIVE_SHA256}" ]]; then
            echo "The actionlint archive checksum did not match the pinned digest." >&2
            exit 1
          fi
          tar -xzf "${archive}" -C "${scratch}" actionlint
          "${scratch}/actionlint" -color -shellcheck= -pyflakes=
      - name: Install Rust
        run: rustup toolchain install 1.96.0 --profile minimal --component rustfmt --component clippy
      - name: Check formatting
        run: cargo +1.96.0 fmt --all -- --check
      - name: Run Clippy
        run: cargo +1.96.0 clippy --all-targets --all-features --locked -- -D warnings
      - name: Test release packaging
        run: python3 -m unittest discover -s scripts -p 'test_*.py'
      - name: Check documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo +1.96.0 doc --no-deps --all-features --locked

  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust
        run: rustup toolchain install 1.96.0 --profile minimal
      - name: Install supervisor MSRV
        if: runner.os != 'Windows'
        run: rustup toolchain install 1.85.0 --profile minimal
      - name: Run tests
        run: cargo +1.96.0 test --all-targets --all-features --locked
      - name: Run default-unused supervisor fixture at MSRV
        if: runner.os != 'Windows'
        run: make supervisor-msrv
      - name: Probe pinned Codex handoff compatibility
        if: runner.os != 'Windows'
        shell: bash
        env:
          CODEX_RELEASE_TAG: rust-v0.144.4
          CODEX_VERSION: 0.144.4
        run: |
          set -euo pipefail
          export LC_ALL=C

          platform="$(uname -s)-$(uname -m)"
          case "${platform}" in
            Linux-x86_64)
              target="x86_64-unknown-linux-musl"
              expected_sha256="37c985be9d89e8c4f43b3aa0594c1213eac212d30ae2b95221f08fec807515d1"
              ;;
            Linux-aarch64 | Linux-arm64)
              target="aarch64-unknown-linux-musl"
              expected_sha256="4d07243ef4ae6786b8b321d7aea3f9be4e1d2c597ae5407e7c1b9873334082b2"
              ;;
            Darwin-x86_64)
              target="x86_64-apple-darwin"
              expected_sha256="274ea4931246621d477ad61d61ea3303527878e77fa910087df52153f5e6188e"
              ;;
            Darwin-arm64 | Darwin-aarch64)
              target="aarch64-apple-darwin"
              expected_sha256="77c8969a481302f9db1d9ea2a6c21c083abae3f1a8fc8a7275dc38323699391e"
              ;;
            *)
              echo "No pinned Codex package is configured for ${platform}." >&2
              exit 1
              ;;
          esac

          scratch="$(mktemp -d "${RUNNER_TEMP:?}/calcifer-codex-handoff.XXXXXX")"
          cleanup() {
            rm -rf "${scratch}"
          }
          trap cleanup EXIT

          archive="${scratch}/codex-${target}.tar.gz"
          release_url="https://github.com/openai/codex/releases/download/${CODEX_RELEASE_TAG}/codex-${target}.tar.gz"
          curl \
            --fail \
            --location \
            --proto '=https' \
            --proto-redir '=https' \
            --tlsv1.2 \
            --connect-timeout 20 \
            --max-time 300 \
            --retry 3 \
            --retry-delay 2 \
            --show-error \
            --silent \
            --output "${archive}" \
            "${release_url}"

          if command -v sha256sum >/dev/null 2>&1; then
            actual_sha256="$(sha256sum "${archive}" | awk '{print $1}')"
          elif command -v shasum >/dev/null 2>&1; then
            actual_sha256="$(shasum -a 256 "${archive}" | awk '{print $1}')"
          else
            echo "Neither sha256sum nor shasum is available." >&2
            exit 1
          fi
          if [[ "${actual_sha256}" != "${expected_sha256}" ]]; then
            echo "Codex package SHA-256 mismatch for ${target}." >&2
            echo "Expected: ${expected_sha256}" >&2
            echo "Actual:   ${actual_sha256}" >&2
            exit 1
          fi

          expected_entry="codex-${target}"
          archive_entries="${scratch}/archive-entries.txt"
          tar -tzf "${archive}" > "${archive_entries}"
          entry_count="$(awk 'END { print NR + 0 }' "${archive_entries}")"
          IFS= read -r archive_entry < "${archive_entries}" || true
          if [[ "${entry_count}" != "1" || "${archive_entry:-}" != "${expected_entry}" ]]; then
            echo "Codex package must contain exactly ${expected_entry}." >&2
            exit 1
          fi

          archive_details="${scratch}/archive-details.txt"
          tar -tvzf "${archive}" > "${archive_details}"
          detail_count="$(awk 'END { print NR + 0 }' "${archive_details}")"
          IFS= read -r archive_detail < "${archive_details}" || true
          if [[ "${detail_count}" != "1" || "${archive_detail:-}" != -* ]]; then
            echo "Codex package entry must be a regular file." >&2
            exit 1
          fi

          extract_dir="${scratch}/extract"
          mkdir "${extract_dir}"
          binary="${extract_dir}/${expected_entry}"
          (umask 077; tar -xOzf "${archive}" "${expected_entry}" > "${binary}")
          if [[ ! -f "${binary}" || -L "${binary}" || ! -s "${binary}" ]]; then
            echo "Codex package did not produce one regular binary." >&2
            exit 1
          fi
          chmod 0700 "${binary}"

          actual_version="$("${binary}" --version)"
          if [[ "${actual_version}" != "codex-cli ${CODEX_VERSION}" ]]; then
            echo "Unexpected Codex package version: ${actual_version}" >&2
            exit 1
          fi

          test_name='providers::codex::handoff_compat::tests::packaged_codex_0_144_4_passes_the_complete_handoff_probe'
          CALCIFER_CODEX_COMPAT_BINARY="${binary}" \
            cargo +1.96.0 test \
              --lib \
              --all-features \
              --locked \
              "${test_name}" \
              -- \
              --exact \
              --ignored \
              --nocapture
      - name: Test Linux mount-boundary enforcement
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail

          command -v jq
          command -v unshare
          command -v mount
          command -v umount
          sudo -n true
          uname -a

          test_name='profiles::tests::removal_rejects_same_device_bind_mount_during_validation_and_cleanup'
          test_binary="$(
            cargo +1.96.0 test \
              --lib \
              --all-features \
              --locked \
              --no-run \
              --message-format=json |
              jq -r '
                select(
                  .reason == "compiler-artifact"
                  and .profile.test == true
                  and .target.name == "calcifer"
                  and (.target.kind | index("lib")) != null
                  and .executable != null
                )
                | .executable
              ' |
              tail -n 1
          )"

          test -n "$test_binary"
          test -x "$test_binary"
          # Consume the complete list. `grep -q` can close the pipe after an
          # early match and make libtest fail with BrokenPipe under pipefail.
          "$test_binary" --list | grep -Fx "$test_name: test" >/dev/null

          sudo -n unshare \
            --mount \
            --propagation private \
            -- \
            "$test_binary" \
            "$test_name" \
            --exact \
            --ignored \
            --nocapture

  msrv:
    name: MSRV (1.85.0)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust
        run: rustup toolchain install 1.85.0 --profile minimal
      - name: Check minimum supported Rust version
        run: cargo +1.85.0 check --all-targets --all-features --locked
