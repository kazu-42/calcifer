name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust
        run: rustup toolchain install 1.96.0 --profile minimal --component rustfmt --component clippy
      - name: Check formatting
        run: cargo +1.96.0 fmt --all -- --check
      - name: Run Clippy
        run: cargo +1.96.0 clippy --all-targets --all-features --locked -- -D warnings
      - name: Test release packaging
        run: python3 -m unittest discover -s scripts -p 'test_*.py'
      - name: Check documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo +1.96.0 doc --no-deps --all-features --locked

  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust
        run: rustup toolchain install 1.96.0 --profile minimal
      - name: Run tests
        run: cargo +1.96.0 test --all-targets --all-features --locked
      - name: Test Linux mount-boundary enforcement
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail

          command -v jq
          command -v unshare
          command -v mount
          command -v umount
          sudo -n true
          uname -a

          test_name='profiles::tests::removal_rejects_same_device_bind_mount_during_validation_and_cleanup'
          test_binary="$(
            cargo +1.96.0 test \
              --lib \
              --all-features \
              --locked \
              --no-run \
              --message-format=json |
              jq -r '
                select(
                  .reason == "compiler-artifact"
                  and .profile.test == true
                  and .target.name == "calcifer"
                  and (.target.kind | index("lib")) != null
                  and .executable != null
                )
                | .executable
              ' |
              tail -n 1
          )"

          test -n "$test_binary"
          test -x "$test_binary"
          "$test_binary" --list | grep -Fqx "$test_name: test"

          sudo -n unshare \
            --mount \
            --propagation private \
            -- \
            "$test_binary" \
            "$test_name" \
            --exact \
            --ignored \
            --nocapture

  msrv:
    name: MSRV (1.85.0)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust
        run: rustup toolchain install 1.85.0 --profile minimal
      - name: Check minimum supported Rust version
        run: cargo +1.85.0 check --all-targets --all-features --locked
