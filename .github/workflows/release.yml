name: Release

on:
  pull_request:
    paths:
      - .github/workflows/ci.yml
      - .github/workflows/release.yml
      - Cargo.lock
      - Cargo.toml
      - Makefile
      - scripts/package_release.py
      - scripts/test_package_release.py
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: 1.96.0

jobs:
  validate:
    name: Validate release input
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      actions: read
      checks: read
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust toolchains
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install 1.96.0 --profile minimal --component clippy --component rustfmt
          rustup toolchain install 1.85.0 --profile minimal
      - name: Read and validate version
        id: version
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          IS_PUBLISH_EVENT: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
        run: |
          set -euo pipefail
          version="$(cargo +"${RUST_TOOLCHAIN}" metadata --locked --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "calcifer") | .version')"
          if [[ -z "${version}" || "${version}" == "null" ]]; then
            echo "Unable to read the Calcifer package version." >&2
            exit 1
          fi
          printf 'version=%s\n' "${version}" >> "${GITHUB_OUTPUT}"

          if [[ "${IS_PUBLISH_EVENT}" != "true" ]]; then
            exit 0
          fi

          if [[ "${GITHUB_REF_NAME}" != "v${version}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match Cargo version v${version}." >&2
            exit 1
          fi

          release_commit="$(git rev-parse "${GITHUB_REF}^{commit}")"
          git fetch --no-tags origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "${release_commit}" refs/remotes/origin/main; then
            echo "Release tags must point to a commit on main." >&2
            exit 1
          fi

          checks="$(gh api --method GET \
            "repos/${GITHUB_REPOSITORY}/commits/${release_commit}/check-runs" \
            -f per_page=100)"
          required_checks=(
            "Quality"
            "Test (ubuntu-latest)"
            "Test (macos-latest)"
            "Test (windows-latest)"
            "MSRV (1.85.0)"
          )
          for required_check in "${required_checks[@]}"; do
            if ! jq -e --arg name "${required_check}" \
              '[.check_runs[] | select(.name == $name and .status == "completed" and .conclusion == "success")] | length > 0' \
              <<<"${checks}" >/dev/null; then
              echo "Required check is not successful for ${release_commit}: ${required_check}" >&2
              exit 1
            fi
          done
      - name: Run repository quality gate
        run: make check

  build:
    name: Build (${{ matrix.target }})
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            python: python3
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04-arm
            python: python3
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            python: python3
          - target: aarch64-apple-darwin
            runner: macos-15
            python: python3
          - target: x86_64-pc-windows-msvc
            runner: windows-2025
            python: python
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          rustup toolchain install "${RUST_TOOLCHAIN}" --profile minimal
          rustup target add "${TARGET}" --toolchain "${RUST_TOOLCHAIN}"
      - name: Build release binary
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: cargo +"${RUST_TOOLCHAIN}" build --release --locked --target "${TARGET}"
      - name: Smoke test native binary
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          suffix=""
          if [[ "${TARGET}" == *windows* ]]; then
            suffix=".exe"
          fi
          binary="./target/${TARGET}/release/calcifer${suffix}"
          actual_version="$("${binary}" --version)"
          if [[ "${actual_version}" != "calcifer ${VERSION}" ]]; then
            echo "Unexpected binary version: ${actual_version}" >&2
            exit 1
          fi
          "${binary}" --help >/dev/null
      - name: Package release archive
        shell: bash
        env:
          PYTHON: ${{ matrix.python }}
          TARGET: ${{ matrix.target }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          suffix=""
          if [[ "${TARGET}" == *windows* ]]; then
            suffix=".exe"
          fi
          "${PYTHON}" scripts/package_release.py \
            --binary "target/${TARGET}/release/calcifer${suffix}" \
            --output-dir dist \
            --target "${TARGET}" \
            --version "${VERSION}"
      - name: Smoke test packaged archive
        shell: bash
        env:
          PYTHON: ${{ matrix.python }}
          TARGET: ${{ matrix.target }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          prefix="calcifer-v${VERSION}-${TARGET}"
          smoke_root="${RUNNER_TEMP}/calcifer-release-smoke"
          rm -rf "${smoke_root}"
          mkdir -p "${smoke_root}"

          if [[ "${TARGET}" == *windows* ]]; then
            "${PYTHON}" -m zipfile -e "dist/${prefix}.zip" "${smoke_root}"
            binary="${smoke_root}/${prefix}/calcifer.exe"
          else
            tar -xzf "dist/${prefix}.tar.gz" -C "${smoke_root}"
            binary="${smoke_root}/${prefix}/calcifer"
          fi

          actual_version="$("${binary}" --version)"
          if [[ "${actual_version}" != "calcifer ${VERSION}" ]]; then
            echo "Unexpected packaged binary version: ${actual_version}" >&2
            exit 1
          fi
          "${binary}" --help >/dev/null
      - name: Upload target archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

  bundle:
    name: Assemble release bundle
    needs:
      - validate
      - build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Download target archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: dist
          merge-multiple: true
      - name: Validate bundle and write checksums
        shell: bash
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          expected=(
            "calcifer-v${VERSION}-aarch64-apple-darwin.tar.gz"
            "calcifer-v${VERSION}-aarch64-unknown-linux-gnu.tar.gz"
            "calcifer-v${VERSION}-x86_64-apple-darwin.tar.gz"
            "calcifer-v${VERSION}-x86_64-pc-windows-msvc.zip"
            "calcifer-v${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          )
          for archive in "${expected[@]}"; do
            if [[ ! -f "dist/${archive}" ]]; then
              echo "Missing release archive: ${archive}" >&2
              exit 1
            fi
          done
          archive_count="$(find dist -maxdepth 1 -type f | wc -l | tr -d ' ')"
          if [[ "${archive_count}" != "5" ]]; then
            echo "Expected exactly five release archives, found ${archive_count}." >&2
            exit 1
          fi
          (
            cd dist
            LC_ALL=C sha256sum "${expected[@]}" > SHA256SUMS
            sha256sum --check SHA256SUMS
          )
      - name: Upload release bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-bundle
          path: dist/*
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

  publish:
    name: Publish GitHub Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs:
      - validate
      - bundle
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - name: Download release bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-bundle
          path: dist
      - name: Refuse to replace an existing release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists; published artifacts are never replaced." >&2
            exit 1
          fi
      - name: Attest release artifacts
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: dist/*
      - name: Create immutable-by-policy pre-release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          gh release create "${TAG}" dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --verify-tag \
            --fail-on-no-commits \
            --generate-notes \
            --notes "Pre-alpha release. Verify SHA256SUMS and GitHub artifact attestations before installation." \
            --prerelease \
            --latest=false \
            --title "Calcifer ${TAG}"
